name: Bot WIF Automatico

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias (paso 1)
        run: |
          python --version
          python -m pip install --upgrade pip setuptools wheel
      
      - name: Instalar dependencias (paso 2)
        run: |
          pip install --no-cache-dir requests python-dotenv
          pip install --no-cache-dir python-binance
          pip install --no-cache-dir pandas numpy
      
      - name: Ejecutar bot WIF
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_wif_conservador.py